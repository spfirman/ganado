# Ganado Frontend — Docker Compose

services:
  # Frontend Web App
  web:
    container_name: ganado_frontend
    image: finca_app_frontend:latest
    restart: unless-stopped
    ports:
      - '${GANADO_FRONTEND_PORT:-8180}:80'
    environment:
      API_BASE_URL: ${GANADO_API_BASE_URL}
      BACKEND_URL: ${GANADO_BACKEND_URL:-http://ganado_backend:3000}
    networks:
      - ganado_infra_net
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

networks:
  ganado_infra_net:
    name: ganado_infra_net
    external: true
