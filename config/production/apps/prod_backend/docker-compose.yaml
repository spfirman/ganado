# Ganado Backend — Docker Compose
# PostgreSQL and Redis removed — uses shared infrastructure.
# See: shared/docker-compose.infra.yml (Redis)
# See: shared/init-databases.sql (PostgreSQL databases in host instance)

services:
  # Backend API
  backend:
    container_name: ganado_backend
    image: finca_app_backend:latest
    restart: unless-stopped
    ports:
      - '${GANADO_BACKEND_PORT:-3100}:3000'
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: 3000
      CORS_ORIGINS: ${GANADO_CORS_ORIGINS}
      CORS_ALLOWED_LOCAL: ${GANADO_CORS_ALLOWED_LOCAL:-}
      # Database — points to host PostgreSQL
      FA_DB_HOST: ${PG_HOST:-host.docker.internal}
      FA_DB_PORT: ${PG_PORT:-5432}
      FA_DB_NAME: ${GANADO_DB_NAME:-ganado_app}
      FA_DB_USER: ${GANADO_DB_USER:-ganado_app_user}
      FA_DB_PASSWORD: ${GANADO_DB_PASSWORD}
      DB_SCHEMA: ${GANADO_DB_SCHEMA:-public}
      DB_MAX_CONNECTIONS: ${GANADO_DB_MAX_CONNECTIONS:-50}
      DB_IDLE_TIMEOUT: ${GANADO_DB_IDLE_TIMEOUT:-10000}
      # Redis — points to shared ganado_redis (db 0)
      FA_REDIS_HOST: ganado_redis
      FA_REDIS_PORT: 6379
      FA_REDIS_PASSWORD: ${GANADO_REDIS_PASSWORD}
      # JWT
      JWT_SECRET: ${GANADO_JWT_SECRET}
      JWT_EXPIRATION: ${GANADO_JWT_EXPIRATION:-24h}
      JWT_REFRESH_EXPIRATION: ${GANADO_JWT_REFRESH_EXPIRATION:-7d}
      # ChirpStack
      CHIRPSTACK_API_URL: ${GANADO_CS_API_URL:-http://ganado_chirpstack:8080}
      CHIRPSTACK_API_KEY: ${GANADO_CS_API_KEY}
      # MQTT — points to ganado_mosquitto
      MQTT_BROKER_URL: ${GANADO_MQTT_BROKER_URL:-mqtt://ganado_mosquitto:1883}
      MQTT_BROKER_HOST: ${GANADO_MQTT_BROKER_HOST:-ganado_mosquitto}
      MQTT_BROKER_PORT: ${GANADO_MQTT_BROKER_PORT:-1883}
      MQTT_BROKER_PROTOCOL: ${GANADO_MQTT_BROKER_PROTOCOL:-mqtt}
    volumes:
      - ${BASE_PATH:-/srv}/${ENVIRONMENT:-production}-srv/docker-data/ganado-uploads:/app/uploads
    networks:
      - ganado_infra_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

networks:
  ganado_infra_net:
    name: ganado_infra_net
    external: true
