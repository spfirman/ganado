# Ganado ChirpStack IoT Stack — Docker Compose
# PostgreSQL and Redis removed — uses shared infrastructure.
# See: shared/docker-compose.infra.yml (Redis on db 1)
# See: shared/init-databases.sql (ganado_chirpstack database in host PG)

services:
  chirpstack:
    container_name: ganado_chirpstack
    image: chirpstack/chirpstack:4.14.0
    command: -c /etc/chirpstack
    restart: unless-stopped
    ports:
      - "${GANADO_CS_PORT:-8180}:8080"
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack
      - ${BASE_PATH:-/srv}/${ENVIRONMENT:-production}-srv/docker-data/ganado-chirpstack:/var/lib/chirpstack
    environment:
      MQTT_BROKER_HOST: ganado_mosquitto
      # Redis — shared instance, database 1
      REDIS_HOST: ganado_redis
      REDIS_PASSWORD: ${GANADO_REDIS_PASSWORD}
      # PostgreSQL — host instance
      POSTGRESQL_HOST: ${PG_HOST:-host.docker.internal}
      POSTGRES_DB: ${GANADO_CS_DB_NAME:-ganado_chirpstack}
      POSTGRES_USER: ${GANADO_CS_DB_USER:-ganado_cs_user}
      POSTGRES_PASSWORD: ${GANADO_CS_DB_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mosquitto
    networks:
      - ganado_infra_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  chirpstack-rest-api:
    container_name: ganado_chirpstack_rest_api
    image: chirpstack/chirpstack-rest-api:4.13.0
    restart: unless-stopped
    command: --server ganado_chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    ports:
      - "${GANADO_CS_REST_API_PORT:-8190}:8090"
    depends_on:
      - chirpstack
    networks:
      - ganado_infra_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  chirpstack-gateway-bridge:
    container_name: ganado_gateway_bridge
    image: chirpstack/chirpstack-gateway-bridge:4.0.11
    restart: unless-stopped
    ports:
      - "${GANADO_CS_BRIDGE_PORT:-1700}:1700/udp"
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    environment:
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=au915_0/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=au915_0/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=au915_0/gateway/{{ .GatewayID }}/command/#
    depends_on:
      - mosquitto
    networks:
      - ganado_infra_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  chirpstack-gateway-bridge-basicstation:
    container_name: ganado_gateway_bridge_bs
    image: chirpstack/chirpstack-gateway-bridge:4.0.11
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-au915_0.toml
    ports:
      - "${GANADO_CS_BRIDGE_BS_PORT:-3101}:3001"
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - mosquitto
    networks:
      - ganado_infra_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  mosquitto:
    container_name: ganado_mosquitto
    image: eclipse-mosquitto:2.0.22
    restart: unless-stopped
    ports:
      - "${GANADO_CS_MOSQUITTO_PORT:-1884}:1883"
    volumes:
      - ./configuration/mosquitto/config/:/mosquitto/config/
      - ./mosquitto/certs:/mosquitto/certs
    networks:
      - ganado_infra_net
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

networks:
  ganado_infra_net:
    name: ganado_infra_net
    external: true
