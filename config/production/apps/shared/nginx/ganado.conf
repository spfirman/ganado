# ============================================================
# Ganado App — NGINX Reverse Proxy Configuration
# ============================================================
# Place this file in /etc/nginx/sites-available/ganado.conf
# and symlink to /etc/nginx/sites-enabled/ganado.conf
#
# After placing, run: sudo nginx -t && sudo systemctl reload nginx
# Then obtain SSL: sudo certbot --nginx -d ganado.yourdomain.com
# ============================================================

server {
    listen 80;
    server_name ganado.yourdomain.com;

    # Redirect HTTP to HTTPS (certbot will add SSL block)
    # Remove this block after certbot runs
    location / {
        return 301 https://$host$request_uri;
    }
}

