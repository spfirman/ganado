# ============================================================
# GPCB — Kernel Tuning for Docker + PostgreSQL + Asterisk
# ============================================================
# Place in /etc/sysctl.d/99-gpcb.conf
#
# Install:
#   sudo cp 99-gpcb.conf /etc/sysctl.d/99-gpcb.conf
#   sudo sysctl --system
#
# Tuned for a server running:
#   - Docker containers (Ganado app, ChirpStack)
#   - PostgreSQL 17
#   - Asterisk/FreePBX
# ============================================================

# --- Memory Management ---
# Reduce swappiness — prefer RAM over swap for DB workloads
vm.swappiness = 10

# Allow overcommit for PostgreSQL (recommended by PG docs)
vm.overcommit_memory = 2
vm.overcommit_ratio = 80

# Larger dirty page thresholds for better write batching
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# --- Network Tuning ---
# Increase connection tracking for Docker + SIP
net.netfilter.nf_conntrack_max = 131072

# SIP uses lots of UDP — increase buffer sizes
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# TCP buffer sizes (min, default, max) — good for mixed workloads
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# Increase listen backlog for NGINX and PostgreSQL
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 4096

# Faster TCP connection reuse
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# Increase local port range for outbound connections
net.ipv4.ip_local_port_range = 10240 65535

# Enable TCP keepalive (shorter intervals for Docker health checks)
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

# --- Security ---
# Prevent IP spoofing
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP redirects (security hardening)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Ignore source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Enable SYN cookies (protect against SYN flood attacks)
net.ipv4.tcp_syncookies = 1

# Log suspicious packets
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Disable ICMP broadcast responses
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# --- Docker ---
# Enable IP forwarding (required by Docker)
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Bridge netfilter — required for Docker iptables rules
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1

# --- File Descriptors ---
# Increase for PostgreSQL + Asterisk + Docker
fs.file-max = 262144

# Increase inotify watches for Docker and file-heavy apps
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512

# --- Shared Memory (PostgreSQL) ---
# Allow PostgreSQL to use larger shared memory segments
# Adjust based on shared_buffers setting in postgresql.conf
kernel.shmmax = 2147483648
kernel.shmall = 524288

# --- Asterisk/RTP ---
# RTP port range uses lots of UDP sockets
# Ensure enough ephemeral ports and socket buffers
# (Covered by net.ipv4.ip_local_port_range and rmem/wmem above)
