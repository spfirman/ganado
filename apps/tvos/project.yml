name: GanadoTV
options:
  bundleIdPrefix: co.com.gpcb
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: WR7US63J6X
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: false

targets:
  GanadoTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: GanadoTV
        excludes:
          - "TopShelfExtension/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.com.gpcb.ganado
        INFOPLIST_FILE: GanadoTV/Info.plist
        PRODUCT_NAME: "Ganado"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: WR7US63J6X
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
    entitlements:
      path: GanadoTV/GanadoTV.entitlements

  GanadoTopShelf:
    type: app-extension
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - GanadoTV/TopShelfExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.com.gpcb.ganado.topshelf
        INFOPLIST_FILE: GanadoTV/TopShelfExtension/Info.plist
        PRODUCT_NAME: "GanadoTopShelf"
        DEVELOPMENT_TEAM: WR7US63J6X
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: GanadoTV
