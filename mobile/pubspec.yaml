name: ganado_app
description: Ganado - Cattle Management System
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Database (Offline-first)
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0

  # Authentication
  flutter_secure_storage: ^9.2.2

  # MQTT (IoT)
  mqtt_client: ^10.2.1

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # UI
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0

  # Preferences
  shared_preferences: ^2.2.3

  # Utils
  uuid: ^4.4.0
  logger: ^2.2.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/

  fonts: []
