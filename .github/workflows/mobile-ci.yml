        uses: actions/checkout@v4

      - name: Download Android App Bundle
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: ./build

      - name: Setup Google Play Service Account
        env:
          GOOGLE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_KEY }}
        run: |
          mkdir -p ~/.google
          echo "$GOOGLE_PLAY_KEY" > ~/.google/play-key.json

      - name: Upload to Google Play (Internal Testing)
        run: |
          # Note: Requires fastlane or internal Google Play API setup
          # This is a placeholder - configure based on your deployment setup
          echo "Deploying to Google Play Internal Testing track..."

      - name: Notify Slack - Android Internal Testing Success
        if: success()
        uses: actions/github-script@v7
        with:
