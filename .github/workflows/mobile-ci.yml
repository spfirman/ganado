  # Deploy visionOS to App Store (develop branch - TestFlight)
  deploy-visionos-testflight:
    name: Deploy visionOS to TestFlight
    runs-on: macos-14
    needs: build-visionos
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download visionOS IPA
        uses: actions/download-artifact@v4
        with:
          name: visionos-ipa
          path: ./build

      - name: Setup Apple Credentials
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstore
          echo "$APPSTORE_API_PRIVATE_KEY" > ~/.appstore/private_key.p8
          chmod 600 ~/.appstore/private_key.p8

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          xcrun altool --upload-app \
            --file ./build/Ganado.ipa \
            --type visionos \
            --apiKey $APPSTORE_API_KEY_ID \
            --apiIssuer $APPSTORE_ISSUER_ID

      - name: Notify Slack - visionOS TestFlight Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const webhook = '${{ secrets.SLACK_WEBHOOK }}';
            if (!webhook) return;
            const fetch = (await import('node-fetch')).default;
            await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text: '✅ visionOS TestFlight Build Successful',
                blocks: [{
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: '*visionOS TestFlight Upload Successful*\nBranch: develop'
                  }
                }]
              })
            });

