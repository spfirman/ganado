        run: |
          mkdir -p ~/.google
          echo "$GOOGLE_PLAY_KEY" > ~/.google/play-key.json

      - name: Upload to Google Play (Production)
        run: |
          # Note: Requires fastlane or internal Google Play API setup
          # This is a placeholder - configure based on your deployment setup
          echo "Deploying to Google Play Production track..."

      - name: Notify Slack - Android Production Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const webhook = '${{ secrets.SLACK_WEBHOOK }}';
            if (!webhook) return;
            const fetch = (await import('node-fetch')).default;
            await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text: '✅ Android Production Build Successful',
                blocks: [{
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: '*Android Production Deployment Successful*\nBranch: main'
                  }
                }]
              })
            });

  # Deploy tvOS to App Store (develop branch - TestFlight)
  deploy-tvos-testflight:
    name: Deploy tvOS to TestFlight
    runs-on: macos-14
    needs: build-tvos
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download tvOS IPA
        uses: actions/download-artifact@v4
        with:
          name: tvos-ipa
