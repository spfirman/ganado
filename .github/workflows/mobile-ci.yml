      - name: Upload to App Store
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          xcrun altool --upload-app \
            --file ./build/ganado_app.ipa \
            --type ios \
            --apiKey $APPSTORE_API_KEY_ID \
            --apiIssuer $APPSTORE_ISSUER_ID

      - name: Notify Slack - iOS App Store Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const webhook = '${{ secrets.SLACK_WEBHOOK }}';
            if (!webhook) return;
            const fetch = (await import('node-fetch')).default;
            await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text: '✅ iOS App Store Build Successful',
                blocks: [{
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: '*iOS App Store Upload Successful*\nBranch: main\nBuild: ganado_app.ipa'
                  }
                }]
              })
            });

      - name: Notify Slack - iOS App Store Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const webhook = '${{ secrets.SLACK_WEBHOOK }}';
            if (!webhook) return;
            const fetch = (await import('node-fetch')).default;
            await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text: '❌ iOS App Store Build Failed',
                blocks: [{
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: '*iOS App Store Upload Failed*\nBranch: main\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
                  }
                }]
              })
            });

  # Deploy Android to Google Play (develop branch - Internal Testing)
  deploy-android-play-develop:
    name: Deploy Android to Play (Internal Testing)
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
