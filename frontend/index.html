<!DOCTYPE html>
<html lang="und">

<head>
  <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.
    -->
  <base href="/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="GPCB Ganado - Cattle Management System">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GPCB Ganado">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>GPCB Ganado</title>

  <!-- Web app manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Runtime environment variables (generated by docker-entrypoint.sh)
       MUST be loaded BEFORE Flutter bootstrap -->
  <script src="env-config.js"></script>

  <style>
    /* Loading spinner shown while Flutter initializes */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.3s ease-out;
    }
    .loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .loading-brand {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .loading-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      margin-top: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Loading splash with GPCB branding, visible until Flutter renders -->
  <div id="loading-overlay" class="loading-overlay" role="status" aria-label="GPCB Ganado is loading">
    <img src="icons/Icon-192.png" alt="GPCB Ganado logo" class="loading-logo">
    <div class="loading-brand">GPCB Ganado</div>
    <div class="loading-subtitle">Cattle Management System</div>
    <div class="loading-spinner" aria-hidden="true"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <!-- Flutter bootstrap first; cleanup runs in background -->
  <script>
    (() => {
      const loadFlutter = () => {
        console.log('[FincaApp] Loading Flutter (no service worker)...');
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        script.async = true;
        script.onerror = () => console.error('[FincaApp] Failed to load flutter_bootstrap.js');
        script.onload = () => console.log('[FincaApp] Flutter bootstrap loaded successfully');
        document.body.appendChild(script);
      };

      // Remove loading overlay once Flutter has rendered its first frame.
      const removeLoadingOverlay = () => {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) {
          overlay.classList.add('fade-out');
          setTimeout(() => overlay.remove(), 300);
        }
      };

      // Watch for Flutter engine element appearing in the DOM.
      const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
          for (const node of mutation.addedNodes) {
            if (node.tagName === 'FLUTTER-VIEW' || node.tagName === 'FLT-GLASS-PANE' || (node.shadowRoot)) {
              removeLoadingOverlay();
              observer.disconnect();
              return;
            }
          }
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Fallback: remove overlay after 8 seconds no matter what
      setTimeout(removeLoadingOverlay, 8000);

      // Start Flutter immediately (do not block on cleanup).
      loadFlutter();

      // Cleanup legacy service workers/caches ONLY when explicitly requested.
      const forceCleanupFromEnv =
        typeof window.ENV !== 'undefined' &&
        String(window.ENV.FORCE_WEB_CACHE_CLEANUP).toLowerCase() === 'true';
      const forceCleanupFromUrl = new URLSearchParams(window.location.search).has('cleanup');
      const shouldCleanup = forceCleanupFromEnv || forceCleanupFromUrl;

      if (shouldCleanup) {
        (async () => {
          console.log('[FincaApp] Starting forced background cleanup...');

          if ('serviceWorker' in navigator) {
            try {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(r => r.unregister()));
            } catch (err) {
              console.warn('[FincaApp] Error unregistering service workers:', err);
            }
          }

          if ('caches' in window) {
            try {
              const keys = await caches.keys();
              await Promise.all(keys.map(k => caches.delete(k)));
            } catch (err) {
              console.warn('[FincaApp] Error clearing caches:', err);
            }
          }
        })();
      }
    })();
  </script>

  <!-- i18n language overlay for multi-language support -->
  <script src="i18n-overlay.js" defer></script>
</body>

</html>
