<!DOCTYPE html>
<html>

<head>
  <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.
    -->
  <base href="/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Application to manage a farm">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="finca_app_frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>finca_app_frontend</title>

  <!-- Web app manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Runtime environment variables (generated by docker-entrypoint.sh)
       MUST be loaded BEFORE Flutter bootstrap -->
  <script src="env-config.js"></script>
</head>

<body>
  <!-- Flutter bootstrap first; cleanup runs in background -->
  <script>
    (() => {
      const loadFlutter = () => {
        console.log('[FincaApp] Loading Flutter (no service worker)...');
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        script.async = true;
        script.onerror = () => console.error('[FincaApp] Failed to load flutter_bootstrap.js');
        script.onload = () => console.log('[FincaApp] Flutter bootstrap loaded successfully');
        document.body.appendChild(script);
      };

      // Start Flutter immediately (do not block on cleanup).
      loadFlutter();

      // Cleanup legacy service workers/caches ONLY when explicitly requested.
      const forceCleanupFromEnv =
        typeof window.ENV !== 'undefined' &&
        String(window.ENV.FORCE_WEB_CACHE_CLEANUP).toLowerCase() === 'true';
      const forceCleanupFromUrl = new URLSearchParams(window.location.search).has('cleanup');
      const shouldCleanup = forceCleanupFromEnv || forceCleanupFromUrl;

      if (shouldCleanup) {
        (async () => {
          console.log('[FincaApp] Starting forced background cleanup...');

          if ('serviceWorker' in navigator) {
            try {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(r => r.unregister()));
            } catch (err) {
              console.warn('[FincaApp] Error unregistering service workers:', err);
            }
          }

          if ('caches' in window) {
            try {
              const keys = await caches.keys();
              await Promise.all(keys.map(k => caches.delete(k)));
            } catch (err) {
              console.warn('[FincaApp] Error clearing caches:', err);
            }
          }
        })();
      }
    })();
  </script>
</body>

</html>
